<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ art['title'] }}</title>
    <link rel="stylesheet" href="{{ url_for('static, filename='style.css') }}">
</head>
<body class="art-detail">
    <div class="art-container">
        <div class="art-image">
            <img src="{{ art['image'] }}" alt="{{ art['title'] }}">
        </div>
    </div>

    <div class="art-information">
        <h1>{{ art['title'] }}</h1>
        <p>{{ art['description'] }}</p>
        <p><strong>rating:</strong> {{ art['rating'] }}/5</p>
        <p><strong>Category:</strong> {{ art['category'] }}/5</p>
    </div>

    <hr>

    <h2>Comments</h2>
    <div class="comments-section">
        {% for c in comments %}
            <p><strong>{{ c['username'] }}:</strong> {{ c['comment_text'] }}</p>
        {% endfor %}
    </div>
</body>
</html>
