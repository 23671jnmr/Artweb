<!DOCTYPE html>
<html>
<head>
    <title>BHS Art Gallery</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="traditional-section">
    <div class="gallery">
        {% for art in uploads %}
        <div class="art-card">
            <img src="{{ art[2] }}" alt="{{ art[1] }}">
            <h3>{{ art[1] }}</h3>
            <p>{{ art[3] }}</p>
            <p>Rating: {{ art[4] }}/5</p>
        </div>
        {% endfor %}
    </div>

    
    
</body>
